<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#1769ff"><link rel="manifest" href="manifest.webmanifest"><title>藍色地圖 JSON 轉換器</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb}header{background:#1769ff;color:#fff;padding:18px}main{padding:16px;max-width:760px;margin:auto}.card{background:#fff;padding:16px;border-radius:16px}input,textarea,select,button{width:100%;box-sizing:border-box;padding:12px;margin-top:10px;font-size:16px;border-radius:10px}textarea{height:300px;font-family:monospace}button{border:0;background:#1769ff;color:#fff;font-weight:700}.secondary{background:#e8eefc;color:#17315f}.status{white-space:pre-wrap;background:#f1f4f9;padding:12px;border-radius:10px;margin-top:12px}</style></head><body><header><h2>藍色地圖 JSON 轉換器</h2></header><main><div class="card"><label>路線名稱</label><input id="name" value="自訂路線"><label>速度</label><select id="speed"><option value="null">交給 App 控制（null）</option><option value="19">19</option></select><label>貼上座標</label><textarea id="coords" placeholder="60.486028,22.142724&#10;60.486340,22.143005"></textarea><button onclick="downloadJson()">產生並下載 JSON</button><button class="secondary" onclick="preview()">預覽</button><div id="status" class="status">尚未轉換。</div></div></main><script>
function parse(){const lines=document.getElementById("coords").value.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);const pts=[];for(let i=0;i<lines.length;i++){const n=lines[i].match(/-?\d+(?:\.\d+)?/g);if(!n||n.length<2)throw new Error(`第 ${i+1} 行無法解析`);let a=+n[0],b=+n[1],lat=a,lng=b;if(Math.abs(a)>90&&Math.abs(b)<=90){lat=b;lng=a}if(Math.abs(lat)>90||Math.abs(lng)>180)throw new Error(`第 ${i+1} 行範圍異常`);pts.push({lat,lng,altitude:null,speed:document.getElementById("speed").value==="null"?null:+document.getElementById("speed").value,heading:null,dwellTimeMs:null})}if(!pts.length)throw new Error("沒有座標");return {groups:[],routes:[{name:document.getElementById("name").value||"自訂路線",description:"",playbackMode:"FOLLOW_PATH",waypoints:pts}]}}
function preview(){try{const o=parse(),s=JSON.stringify(o,null,2);document.getElementById("status").textContent=`成功解析 ${o.routes[0].waypoints.length} 點\n\n`+s.slice(0,3000)}catch(e){document.getElementById("status").textContent="錯誤："+e.message}}
function downloadJson(){try{const o=parse(),s=JSON.stringify(o,null,2),c=o.routes[0].waypoints.length,n=(o.routes[0].name||"自訂路線").replace(/[\\/:*?"<>|]+/g,"_"),sp=o.routes[0].waypoints[0].speed===null?"null":o.routes[0].waypoints[0].speed,b=new Blob([s],{type:"application/json"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=`藍色地圖_${n}_${c}點_speed_${sp}.json`;a.click();URL.revokeObjectURL(u);document.getElementById("status").textContent=`已產生 ${c} 點 JSON`}catch(e){document.getElementById("status").textContent="錯誤："+e.message}}
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");
</script></body></html>
